{% extends "base.html" %}

{% block title %}
<title>แบบฟอร์มแก้ไขข้อมูลประชากร - ICT12367</title>

<style>
    .btn-reset-custom:hover {
        background-color: #dc3545 !important; 
        border-color: #dc3545 !important;
        color: white !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="container my-5"> <div class="row justify-content-center">
        <div class="col-md-6"> <div class="card">
                <div class="card-header bg-success text-white text-center">
                    <h4>แบบฟอร์มบันทึกข้อมูลประชากร</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="{% url 'edit' person.id %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="name" class="form-label">ชื่อประชากร</label>
                            <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-นามสกุล">
                        </div>

                        <div class="mb-3">
                            <label for="age" class="form-label">อายุ</label>
                            <input type="number" class="form-control" name="age" placeholder="กรอกข้อมูลอายุเป็นตัวเลข">
                        </div>

                        <div class="d-flex justify-content-center gap-2">
                            <button type="submit" class="btn" style="background-color:#d63384; color:white;">อัปเดตข้อมูล</button>
    
                             <button type="reset" class="btn" style="background-color:#fd7e14; color:white;">ล้างข้อมูล</button>
                      </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}{% load static %}

{% block title %}
<title>Image</title>
<style>
    .gallery-img {
        height: 200px; 
        object-fit: cover; 
        cursor: pointer; 
        transition: transform 0.2s;
    }
    .gallery-img:hover {
        transform: scale(1.05); 
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h1 class="display-5 fw-bold text-success">ภาพผลงาน</h1>
            <p class="text-muted fs-5">แสดงรูปภาพกิจกรรมและผลงานต่างๆ</p>
            <hr class="w-25 mx-auto border-success border-2 opacity-50">
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <img src="{% static 'image/1.1.jpg' %}" class="card-img-top gallery-img" alt="Image 1">
                <div class="card-body text-center p-2">
                    <small class="text-muted">รูปภาพที่ 1</small>
                </div>
            </div>
        </div>

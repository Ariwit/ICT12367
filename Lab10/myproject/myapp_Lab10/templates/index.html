{% extends 'base.html' %}

{% block content %}
<table class="table table-hover">
    <thead>
        <tr>
            <th scope="col">รหัสประชากร</th>
            <th scope="col">ชื่อประชากร</th>
            <th scope="col">อายุ</th>
            <th scope="col">แก้ไข</th>
            <th scope="col">ลบ</th>
        </tr>
    </thead>
 <tbody>
    {% for person in all_person %}
    <tr>
        <th scope="row">{{person.id}}</th>
        <td>{{person.name}}</td>
        <td>{{person.age}}</td>
        <td class="align-middle text-center"><a href="#" class="btn" style="background-color:#fd7e14; color:white;">แก้ไข</a></td>
        <td><a href="#" class="btn" style="background-color:#d63384; color:white;">ลบ</a></td>
    </tr>
    {% endfor %}
 </tbody>   
</table>
{% endblock %}
